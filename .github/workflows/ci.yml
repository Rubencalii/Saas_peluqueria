name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend (PHPUnit)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: peluqueria
          POSTGRES_PASSWORD: peluqueria
          POSTGRES_DB: peluqueria
          TZ: UTC
          PGTZ: UTC
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U peluqueria -d peluqueria"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # En entorno test, Doctrine añade el sufijo _test → base "peluqueria_test".
      DATABASE_URL: "postgresql://peluqueria:peluqueria@127.0.0.1:5432/peluqueria?serverVersion=16&charset=utf8"

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, ctype, iconv
          coverage: none

      - name: Instalar cliente de PostgreSQL
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Instalar dependencias
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Preparar base de datos de test
        env:
          PGPASSWORD: peluqueria
        run: |
          psql -h 127.0.0.1 -U peluqueria -d peluqueria -c "CREATE DATABASE peluqueria_test;"
          for f in db/migrations/0001_init.sql \
                   db/migrations/0002_overlap_protection.sql \
                   db/migrations/0003_idempotency.sql \
                   db/migrations/0004_appointment_public_code.sql \
                   db/migrations/0005_whatsapp_conversation.sql \
                   db/migrations/0006_waitlist.sql \
                   db/migrations/0007_staff_calendar_token.sql \
                   db/migrations/0008_payments.sql \
                   db/migrations/0009_password_reset.sql \
                   db/seed.sql; do
            psql -h 127.0.0.1 -U peluqueria -d peluqueria_test -v ON_ERROR_STOP=1 -q -f "$f"
          done

      - name: Lint de PHP
        working-directory: backend
        run: find src -name '*.php' -print0 | xargs -0 -n1 -P4 php -l > /dev/null

      - name: Tests (PHPUnit)
        working-directory: backend
        run: php bin/phpunit
