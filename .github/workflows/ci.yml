name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend (PHPUnit)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: peluqueria
          POSTGRES_PASSWORD: peluqueria
          POSTGRES_DB: peluqueria
          TZ: UTC
          PGTZ: UTC
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U peluqueria -d peluqueria"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # En entorno test, Doctrine añade el sufijo _test → base "peluqueria_test".
      DATABASE_URL: "postgresql://peluqueria:peluqueria@127.0.0.1:5432/peluqueria?serverVersion=16&charset=utf8"

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, ctype, iconv
          coverage: none

      - name: Instalar cliente de PostgreSQL
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Instalar dependencias
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Preparar base de datos de test
        env:
          PGPASSWORD: peluqueria
        run: |
          psql -h 127.0.0.1 -U peluqueria -d peluqueria -c "CREATE DATABASE peluqueria_test;"
          # Todas las migraciones en orden (están numeradas 0001..NNNN) y luego el seed.
          for f in $(ls db/migrations/*.sql | sort) db/seed.sql; do
            psql -h 127.0.0.1 -U peluqueria -d peluqueria_test -v ON_ERROR_STOP=1 -q -f "$f"
          done

      - name: Lint de PHP
        working-directory: backend
        run: find src -name '*.php' -print0 | xargs -0 -n1 -P4 php -l > /dev/null

      - name: Análisis estático (PHPStan)
        working-directory: backend
        run: php vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: Tests (PHPUnit)
        working-directory: backend
        run: php bin/phpunit

  frontend:
    name: Frontend (Vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Tests (Vitest)
        working-directory: frontend
        run: npm run test

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
