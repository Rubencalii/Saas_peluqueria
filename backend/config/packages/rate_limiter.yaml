framework:
    rate_limiter:
        # Límite para los endpoints públicos de reserva (doc 06 §6): evita
        # scraping de disponibilidad y abuso del alta de citas. Por IP.
        public_api:
            policy: 'sliding_window'
            limit: 60
            interval: '1 minute'
        # Login del panel: límite estricto por IP para frenar la fuerza bruta.
        auth_login:
            policy: 'sliding_window'
            limit: 10
            interval: '1 minute'
        # Alta de salón (público): muy estricto para frenar creación masiva de
        # cuentas falsas. Por IP.
        signup:
            policy: 'sliding_window'
            limit: 5
            interval: '1 hour'

# En test no aplicamos rate limiting (varios tests funcionales hacen login en la
# misma ventana y dispararían 429 sin probar nada del límite en sí).
when@test:
    framework:
        rate_limiter:
            public_api:
                policy: 'sliding_window'
                limit: 1000000
                interval: '1 minute'
            auth_login:
                policy: 'sliding_window'
                limit: 1000000
                interval: '1 minute'
            signup:
                policy: 'sliding_window'
                limit: 1000000
                interval: '1 hour'
